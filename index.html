<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>內容確認系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f1eb;
  --card:#fdfaf5;
  --ink:#1a1612;
  --muted:#8a7f72;
  --line:#e2d9cc;
  --main:#2a5c45;
  --main-light:#e8f0ec;
  --accent:#c4843a;
  --accent-light:#fdf0e3;
  --red:#b5341a;
  --red-light:#fdecea;
  --blue:#1a5478;
  --blue-light:#e8f1f7;
  --gold:#8a6d20;
  --gold-light:#fdf5e0;
  --radius:14px;
  --shadow:0 4px 20px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden;max-width:100vw}

/* TOP BAR */
.top{background:var(--main);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.top-logo{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.top h1{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;letter-spacing:.02em}
.top p{font-size:11px;opacity:.65;margin-top:1px}

/* WRAP */
.wrap{max-width:860px;margin:0 auto;padding:20px 16px}

/* BREADCRUMB */
.bar{display:flex;align-items:center;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.crumb{font-size:12px;color:var(--muted);padding:3px 8px;border-radius:6px;transition:.15s}
.crumb.current{color:var(--ink);font-weight:700;background:rgba(0,0,0,.05)}
.crumb.link{cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.crumb.link:hover{color:var(--main);background:var(--main-light)}
.sep{color:var(--line);font-size:14px}

/* PANEL */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:16px}
.title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:900;color:var(--main);margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:18px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.tile{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;transition:.18s;font-size:13px}
.tile:hover{background:var(--main);border-color:var(--main);color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(42,92,69,.2)}
.tile .icon{font-size:24px;margin-bottom:6px}
.typeGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.typeBtn{border:1.5px solid var(--line);border-radius:14px;background:var(--card);padding:24px;cursor:pointer;text-align:center;transition:.18s;font-family:inherit;color:var(--ink)}
.typeBtn:hover{background:var(--main);color:#fff;border-color:var(--main);transform:translateY(-2px)}

/* TASK CARD */
.task{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.task.priority{border-color:var(--main);border-width:2px}
.task.done-section{opacity:.75;border-style:dashed}

/* TASK HEAD */
.taskHead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:13px 16px;cursor:pointer;user-select:none;transition:.15s}
.taskHead:hover{background:rgba(0,0,0,.02)}
.taskId{font-family:ui-monospace,monospace;font-size:11px;background:#f0ebe4;color:#7a6a58;border-radius:6px;padding:3px 7px}
.persona{font-size:12px;color:var(--accent);font-weight:500}
.grow{flex:1}
.date{font-size:11px;color:var(--muted)}
.chevron{font-size:14px;color:var(--muted);transition:transform .2s;margin-left:4px}
.task.open .chevron{transform:rotate(90deg)}

/* STATUS BADGE */
.badge{font-size:11px;border-radius:20px;padding:3px 10px;font-weight:700;white-space:nowrap}
.badge.pending{background:var(--gold-light);color:var(--gold)}
.badge.need-action{background:var(--accent-light);color:var(--accent)}
.badge.modify{background:var(--red-light);color:var(--red)}
.badge.in-progress{background:#f0f0f0;color:#888}
.badge.review{background:var(--blue-light);color:var(--blue)}
.badge.ok{background:var(--main-light);color:var(--main)}

/* STATUS LABEL ROW */
.status-row{display:flex;align-items:center;gap:6px;padding:6px 16px 0;flex-wrap:wrap}
.status-step{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.status-step .dot{width:6px;height:6px;border-radius:50%;background:var(--line)}
.status-step.active .dot{background:var(--main)}
.status-step.active{color:var(--main);font-weight:700}
.status-step.done .dot{background:var(--muted)}

/* TASK BODY */
.body{display:none;border-top:1px solid var(--line)}
.task.open .body{display:block}
.body-inner{padding:16px}
.field{margin-bottom:14px}
.label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.value{white-space:pre-wrap;word-break:break-word;background:#f7f3ed;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.65;max-width:100%}
.imgs{display:flex;gap:10px;flex-wrap:wrap;max-width:100%}
.img{width:110px;height:110px;object-fit:cover;border-radius:10px;border:1px solid var(--line);cursor:pointer;background:#eee;flex-shrink:0}

/* ACTION ZONE */
.action-zone{background:#f9f6f1;border-top:1px solid var(--line);padding:16px}
.action-zone-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.06em;margin-bottom:12px;text-transform:uppercase}
.action-video-zone{background:#f0f5f8;border-top:1.5px dashed #ccd8e0;padding:16px;margin-top:0}
.action-video-title{font-size:12px;font-weight:800;color:var(--blue);letter-spacing:.06em;margin-bottom:12px}

select,textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;background:#fff;font:inherit;font-size:14px;padding:10px 12px;margin-bottom:10px;color:var(--ink);transition:.15s;appearance:auto}
select:focus,textarea:focus{outline:none;border-color:var(--main);box-shadow:0 0 0 3px rgba(42,92,69,.1)}
textarea{min-height:96px;resize:vertical;line-height:1.6}

.btn{border:0;border-radius:10px;background:var(--main);color:#fff;font:700 13px/1 'Noto Sans TC',sans-serif;padding:11px 20px;cursor:pointer;transition:.18s;letter-spacing:.02em}
.btn:hover{background:#1d4532;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-video{background:var(--blue)}
.btn-video:hover{background:#13405d}
.btn-sm{font-size:12px;padding:8px 14px;background:transparent;border:1.5px solid var(--line);color:var(--muted);border-radius:8px}
.btn-sm:hover{border-color:var(--main);color:var(--main);background:var(--main-light)}

/* VIDEO LINK */
.video-link{display:inline-flex;align-items:center;gap:8px;background:var(--blue-light);color:var(--blue);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;text-decoration:none;margin-bottom:10px}
.video-link:hover{background:#d0e5f2}

/* SECTION DIVIDER */
.section-done{margin-top:24px;margin-bottom:8px}
.section-done-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:8px}
.section-done-label::after{content:'';flex:1;height:1px;background:var(--line)}

.hidden{display:none}
.loader{padding:48px;text-align:center;color:var(--muted);font-size:14px}
.empty{text-align:center;color:var(--muted);padding:42px;font-size:14px}

/* TOAST */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(8px);background:#1a1612;color:#fff;padding:11px 18px;border-radius:12px;opacity:0;transition:.25s;z-index:200;font-size:13px;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;place-items:center;z-index:300;cursor:pointer}
.lightbox.show{display:grid}
.lightbox img{max-width:92vw;max-height:90vh;border-radius:10px}

@media(max-width:600px){
  .wrap{padding:14px 12px}
  .typeGrid{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .taskHead{flex-wrap:wrap}
  .date{font-size:10px}
  textarea{min-height:80px}
}
</style>
</head>
<body>
<div class="top">
  <div class="top-logo">📋</div>
  <div>
    <h1 id="appTitle">內容確認系統</h1>
    <p>Content Review Portal</p>
  </div>
</div>
<div class="wrap">
  <div id="crumbs" class="bar"></div>

  <section id="sceneClient" class="panel hidden">
    <h2 class="title">選擇客戶</h2><div class="sub">內部測試用；正式給客戶時請用 ?client=客戶代號</div><div id="clientGrid" class="grid"></div>
  </section>

  <section id="sceneMonth" class="panel hidden">
    <h2 class="title">選擇月份</h2><div class="sub">請選擇要確認的發布月份</div><div id="monthGrid" class="grid"></div>
  </section>

  <section id="sceneProduct" class="panel hidden">
    <h2 class="title">選擇商品</h2><div id="productSub" class="sub"></div><div id="productGrid" class="grid"></div>
  </section>

  <section id="sceneType" class="panel hidden">
    <h2 class="title">選擇內容類型</h2><div id="typeSub" class="sub"></div>
    <div class="typeGrid">
      <button class="typeBtn" onclick="chooseType('thread')"><div style="font-size:32px;margin-bottom:8px">🧵</div><b>脆（Threads）</b><br><small style="color:inherit;opacity:.7">短文 / 圖片 / 留言</small></button>
      <button class="typeBtn" onclick="chooseType('video')"><div style="font-size:32px;margin-bottom:8px">🎬</div><b>影音</b><br><small style="color:inherit;opacity:.7">腳本 / 畫面說明</small></button>
    </div>
  </section>

  <section id="sceneTasks" class="panel hidden">
    <h2 id="taskTitle" class="title"></h2><div id="taskSub" class="sub"></div><div id="taskList"></div>
  </section>
</div>
<div id="toast" class="toast"></div>
<div id="lightbox" class="lightbox" onclick="closeLB()"><img id="lbImg" alt="preview"></div>
<script>
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxBPxJSK_VPMQnPOfWvHTx2fkq9NgOgFegziTSPFiaS-J5-duSITKM8xdj7je6gDcE/exec';

const state = { client:'', clientName:'', month:'', product:'', type:'', meta:null };
const $ = id => document.getElementById(id);
const qs = new URLSearchParams(location.search);

init();
async function init(){
  state.client = qs.get('client') || '';
  if(!GAS_API_URL || GAS_API_URL.includes('PASTE_')) return showOnly('sceneMonth','<div class="empty">請先設定 GAS_API_URL</div>');
  if(!state.client) return loadClients();
  await loadMeta();
}
async function api(action, params={}){
  const url = new URL(GAS_API_URL);
  url.searchParams.set('action', action);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k] ?? ''));
  const res = await fetch(url.toString(), { method:'GET' });
  const data = await res.json();
  if(data.ok === false) throw new Error(data.error || 'API error');
  return data;
}
async function loadClients(){
  showOnly('sceneClient','<div class="loader">載入中…</div>');
  try{
    const data = await api('clients');
    $('clientGrid').innerHTML = data.clients.map(c=>`<div class="tile" onclick="chooseClient('${esc(c.clientId)}','${esc(c.clientName)}')"><div class="icon">🏷️</div><b>${html(c.clientName||c.clientId)}</b></div>`).join('') || '<div class="empty">沒有啟用客戶</div>';
    showOnly('sceneClient'); updateCrumbs();
  }catch(e){ showOnly('sceneClient',`<div class="empty">載入失敗：${html(e.message)}</div>`); }
}
async function chooseClient(id, name){ state.client=id; state.clientName=name; history.replaceState(null,'',location.pathname+'?client='+encodeURIComponent(id)); await loadMeta(); }
async function loadMeta(){
  try{
    const data = await api('meta',{client:state.client});
    state.meta=data; state.clientName=(data.client&&data.client.clientName)||state.client;
    $('appTitle').textContent=state.clientName+'｜內容確認系統';
    $('monthGrid').innerHTML=(data.months||[]).length
      ? data.months.map(m=>`<div class="tile" onclick="chooseMonth('${esc(m)}')"><div class="icon">📅</div><b>${html(m)}</b></div>`).join('')
      : '<div class="empty">目前沒有月份資料</div>';
    showOnly('sceneMonth'); updateCrumbs();
  }catch(e){
    showOnly('sceneMonth',`<div class="empty">載入失敗：${html(e.message)}</div>`);
  }
}
function chooseMonth(m){
  state.month=m;
  $('productSub').textContent='月份：'+m;
  $('productGrid').innerHTML=(state.meta.products||[]).map((p,i)=>`<div class="tile" onclick="chooseProduct('${esc(p)}')"><div class="icon">${['🛍️','💊','🧴','🍵','✨','🎯'][i%6]}</div><b>${html(p)}</b></div>`).join('')||'<div class="empty">無商品</div>';
  showOnly('sceneProduct'); updateCrumbs();
}
function chooseProduct(p){ state.product=p; $('typeSub').textContent=state.month+' · '+state.product; showOnly('sceneType'); updateCrumbs(); }
function chooseType(t){ state.type=t; loadTasks(); showOnly('sceneTasks'); updateCrumbs(); }

async function loadTasks(){
  $('taskTitle').textContent=state.type==='thread'?'脆（Threads）確認':'影音確認';
  $('taskSub').textContent=`${state.month} · ${state.product}`;
  $('taskList').innerHTML='<div class="loader">載入任務中…</div>';
  try{
    const data=await api('data',{client:state.client,month:state.month,product:state.product,type:state.type});
    renderTasks(data.tasks||[],data.sheetName||'');
  }catch(e){ $('taskList').innerHTML=`<div class="empty">載入失敗：${html(e.message)}</div>`; }
}

// ─── 狀態計算 ───────────────────────────────────────────────
function getTaskDisplayState(t){
  var s = t.status || '';
  var vs = t.videoStatus || '';
  var hasVideo = !!t.videoLink;
  var isVideo = state.type === 'video';

  if(!isVideo){
    // 脆
    if(!s || s==='客戶尚未確認') return {group:'active', label:'待確認', cls:'need-action', emoji:'📝'};
    if(s==='客戶已回需修改')      return {group:'passive', label:'二稿修改中', cls:'modify', emoji:'✏️'};
    if(s==='修改完成，需確認')     return {group:'active', label:'修改稿待確認', cls:'review', emoji:'🔍'};
    if(s==='確認完畢')             return {group:'done', label:'腳本確認完畢', cls:'ok', emoji:'✅'};
  } else {
    // 影音
    if(!s || s==='客戶尚未確認') return {group:'active', label:'腳本待確認', cls:'need-action', emoji:'📝'};
    if(s==='客戶已回需修改')      return {group:'passive', label:'二稿修改中', cls:'modify', emoji:'✏️'};
    if(s==='修改完成，需確認')     return {group:'active', label:'腳本修改稿待確認', cls:'review', emoji:'🔍'};
    if(s==='確認完畢'){
      if(!hasVideo && (!vs || vs==='影片需確認')) return {group:'passive', label:'影片製作中', cls:'in-progress', emoji:'🎬'};
      if(vs==='影片需確認' && hasVideo)  return {group:'active', label:'影片待確認', cls:'need-action', emoji:'🎥'};
      if(vs==='需修改')                   return {group:'passive', label:'影片修改中', cls:'modify', emoji:'🔧'};
      if(vs==='修改稿需確認')             return {group:'active', label:'影片修改稿待確認', cls:'review', emoji:'🔍'};
      if(vs==='確認完畢')                 return {group:'done', label:'全部確認完畢', cls:'ok', emoji:'✅'};
      // 腳本OK但影片狀態空
      return {group:'passive', label:'影片製作中', cls:'in-progress', emoji:'🎬'};
    }
  }
  return {group:'active', label:'待確認', cls:'need-action', emoji:'📝'};
}

function renderTasks(tasks, sheetName){
  if(!tasks.length){ $('taskList').innerHTML='<div class="empty">目前沒有任務資料</div>'; return; }

  // ★ 篩掉狀態空白的任務（腳本尚未分配，不需客戶看）
  var filtered = tasks.filter(function(t){ return t.status && t.status.trim() !== ''; });
  if(!filtered.length){ $('taskList').innerHTML='<div class="empty">目前沒有待確認的任務</div>'; return; }

  var active=[], passive=[], done=[];
  filtered.forEach(function(t,i){
    var ds = getTaskDisplayState(t);
    var obj = {t:t, ds:ds, i:i, sheetName:sheetName};
    if(ds.group==='done') done.push(obj);
    else if(ds.group==='passive') passive.push(obj);
    else active.push(obj);
  });

  if(!active.length && !passive.length && !done.length){
    $('taskList').innerHTML='<div class="empty">目前沒有任務</div>'; return;
  }

  var html_out = '';

  if(active.length){
    active.forEach(function(o){ html_out += taskHTML(o.t, o.sheetName, 'task'+o.i, o.ds, true); });
  }
  if(passive.length){
    passive.forEach(function(o){ html_out += taskHTML(o.t, o.sheetName, 'task'+o.i, o.ds, false); });
  }
  if(done.length){
    html_out += '<div class="section-done"><div class="section-done-label">已確認完畢（可點開調整）</div></div>';
    done.forEach(function(o){ html_out += taskHTML(o.t, o.sheetName, 'task'+o.i, o.ds, false); });
  }

  $('taskList').innerHTML = html_out || '<div class="empty">🎉 所有任務都已確認完畢</div>';
}

function taskHTML(t, sheetName, id, ds, isPriority){
  var s = t.status || '';
  var vs = t.videoStatus || '';
  var hasVideo = !!t.videoLink;
  var isDone = ds.group==='done';

  // 腳本下拉
  var scriptOpts = ['客戶尚未確認','客戶已回需修改','修改完成，需確認','確認完畢'];
  var scriptSelect = '<select id="ssel-'+id+'">'
    + scriptOpts.map(function(o){ return '<option'+(s===o?' selected':'')+'>'+o+'</option>'; }).join('')
    + '</select>';

  // 影片下拉
  var videoOpts = ['影片需確認','需修改','修改稿需確認','確認完畢'];
  var videoSelect = '<select id="vsel-'+id+'">'
    + videoOpts.map(function(o){ return '<option'+(vs===o?' selected':'')+'>'+o+'</option>'; }).join('')
    + '</select>';

  // 脆：顯示圖片+留言內圖片；影音：不顯示圖片區塊
  var imgs = state.type === 'thread'
    ? ['image1','image2','image3','commentImg1','commentImg2'].map(function(k){ return imgHTML(t[k]); }).filter(Boolean).join('')
    : '';

  // 影片區
  var videoSection = '';
  if(state.type==='video'){
    var needVideoAction = (s==='確認完畢') && hasVideo && (vs!=='確認完畢');
    var videoVisible = s==='確認完畢'; // 只有腳本確認後才顯示影片區
    if(videoVisible){
      videoSection = '<div class="action-video-zone">'
        + '<div class="action-video-title">🎬 影片確認</div>'
        + (hasVideo
            ? '<a class="video-link" href="'+html(t.videoLink)+'" target="_blank">▶️ 開啟影片</a>'
            : '<div style="color:var(--muted);font-size:13px;margin-bottom:10px">⏳ 影片製作中，尚未上傳</div>')
        + (hasVideo ? videoSelect : '')
        + '<textarea id="vfb-'+id+'" placeholder="影片回饋意見（可空白）">'+html(t.videoFeedback||'')+'</textarea>'
        + (hasVideo ? '<button class="btn btn-video" onclick="submitTask(event,\''+id+'\',\''+esc(sheetName)+'\',\''+esc(t.taskId)+'\',\'video\')">送出影片確認</button>' : '')
        + '</div>';
    }
  }

  // 腳本動作區（done 時也顯示但折疊）
  var scriptAction = '<div class="action-zone">'
    + '<div class="action-zone-title">📝 腳本確認</div>'
    + scriptSelect
    + '<textarea id="sfb-'+id+'" placeholder="回饋意見（可空白）">'+html(t.feedback||'')+'</textarea>'
    + '<button class="btn" onclick="submitTask(event,\''+id+'\',\''+esc(sheetName)+'\',\''+esc(t.taskId)+'\',\'script\')">送出腳本確認</button>'
    + '</div>'
    + videoSection;

  var taskClass = 'task' + (isPriority?' priority':'') + (isDone?' done-section':'');
  var autoOpen = isPriority && !isDone;

  return '<div class="'+taskClass+'" id="'+id+'"'+(autoOpen?' style="--open:1"':'')+' data-auto-open="'+autoOpen+'">'
    + '<div class="taskHead" onclick="toggleTask(\''+id+'\')">'
    + '<span style="font-size:16px">'+ds.emoji+'</span>'
    + '<span class="taskId">'+html(t.taskId)+'</span>'
    + (t.persona ? '<span class="persona">'+html(t.persona)+'</span>' : '')
    + '<span class="badge '+ds.cls+'">'+html(ds.label)+'</span>'
    + '<span class="grow"></span>'
    + (t.planner  ? '<span class="date">企劃：'+html(t.planner)+'</span>'  : '')
    + (t.doneDate ? '<span class="date">'+html(t.doneDate)+'</span>' : '')
    + '<span class="chevron">›</span>'
    + '</div>'
    + '<div class="body">'
    + '<div class="body-inner">'
    + '<div class="field"><div class="label">腳本內容</div><div class="value">'+html(t.content||'—')+'</div></div>'
    + (t.comment ? '<div class="field"><div class="label">留言</div><div class="value">'+html(t.comment)+'</div></div>' : '')
    + (t.feedback ? '<div class="field"><div class="label">上次回饋</div><div class="value" style="background:var(--accent-light);border-left:3px solid var(--accent)">'+html(t.feedback)+'</div></div>' : '')
    + (t.videoFeedback ? '<div class="field"><div class="label">影片回饋記錄</div><div class="value" style="background:var(--blue-light);border-left:3px solid var(--blue)">'+html(t.videoFeedback)+'</div></div>' : '')
    + (imgs ? '<div class="field"><div class="label">圖片 / 畫面</div><div class="imgs">'+imgs+'</div></div>' : '')
    + '</div>'
    + scriptAction
    + '</div>'
    + '</div>';
}

function imgHTML(url){
  if(!url || url.trim()==='') return '';
  var u = url.trim();
  // 已轉成 thumbnail 格式
  if(u.includes('drive.google.com/thumbnail'))
    return '<img class="img" src="'+html(u)+'" onclick="openLB(\''+esc(u)+'\')" loading="lazy">';
  // Drive file 連結，轉成 thumbnail
  var m = u.match(/\/file\/d\/([^\/\?]+)/);
  if(!m) m = u.match(/[?&]id=([^&]+)/);
  if(m){
    var thumb = 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w800';
    return '<img class="img" src="'+html(thumb)+'" onclick="openLB(\''+esc(thumb)+'\')" loading="lazy">';
  }
  // 其他連結
  return '<a href="'+html(u)+'" target="_blank" style="font-size:12px;color:var(--blue)">開啟圖片</a>';
}

async function submitTask(ev, id, sheetName, taskId, submitKind){
  ev.stopPropagation();
  var btn=ev.target; btn.disabled=true; btn.textContent='送出中…';
  var status='', feedback='', videoStatus='', videoFeedback='';
  if(submitKind==='script'){
    status   = document.getElementById('ssel-'+id).value;
    feedback = document.getElementById('sfb-'+id).value;
  } else {
    videoStatus   = document.getElementById('vsel-'+id).value;
    videoFeedback = document.getElementById('vfb-'+id).value;
  }
  try{
    await api('submit',{client:state.client,type:state.type,sheetName:sheetName,taskId:taskId,submitKind:submitKind,status:status,feedback:feedback,videoStatus:videoStatus,videoFeedback:videoFeedback});
    toast('✅ 已送出');

    // ★ 就地更新：不重跑畫面，直接更新 task 的狀態 badge 和分組
    var taskEl = document.getElementById(id);
    if(taskEl){
      // 更新本地狀態物件以便重算 badge
      var fakeT = {};
      taskEl.querySelectorAll('select').forEach(function(sel){
        if(sel.id==='ssel-'+id) fakeT.status = sel.value;
        if(sel.id==='vsel-'+id) fakeT.videoStatus = sel.value;
      });
      fakeT.status = fakeT.status || status || '';
      fakeT.videoStatus = fakeT.videoStatus || videoStatus || '';
      fakeT.videoLink = taskEl.querySelector('.video-link') ? '有' : '';

      var newDs = getTaskDisplayState(fakeT);

      // 更新 badge
      var badge = taskEl.querySelector('.badge');
      if(badge){
        badge.className = 'badge '+newDs.cls;
        badge.textContent = newDs.label;
      }
      // 更新 emoji
      var emojiEl = taskEl.querySelector('.taskHead span:first-child');
      if(emojiEl) emojiEl.textContent = newDs.emoji;

      // 如果變成 done，移到下方區塊
      if(newDs.group === 'done'){
        taskEl.classList.remove('priority');
        taskEl.classList.add('done-section');
        // 找或建立 done 區塊
        var doneSection = document.querySelector('.section-done');
        if(!doneSection){
          var divider = document.createElement('div');
          divider.className = 'section-done';
          divider.innerHTML = '<div class="section-done-label">已確認完畢（可點開調整）</div>';
          $('taskList').appendChild(divider);
        }
        $('taskList').appendChild(taskEl);
        taskEl.classList.remove('open');
      }
    }

    btn.disabled=false;
    btn.textContent=submitKind==='script'?'送出腳本確認':'送出影片確認';
  }catch(e){
    toast('⚠️ 送出失敗：'+e.message);
    btn.disabled=false;
    btn.textContent=submitKind==='script'?'送出腳本確認':'送出影片確認';
  }
}

function showOnly(id, inner){
  ['sceneClient','sceneMonth','sceneProduct','sceneType','sceneTasks'].forEach(s=>$(s).classList.add('hidden'));
  $(id).classList.remove('hidden');
  if(inner) $(id).innerHTML=inner;
}
function updateCrumbs(){
  var parts=[];
  if(state.clientName) parts.push({label:'客戶', fn:function(){location.href=location.pathname;}});
  if(state.month)      parts.push({label:state.month, fn:function(){state.month='';state.product='';state.type='';loadMeta();}});
  if(state.product)    parts.push({label:state.product, fn:function(){state.product='';state.type='';showOnly('sceneProduct');updateCrumbs();}});
  if(state.type)       parts.push({label:state.type==='thread'?'脆':'影音', fn:null});

  $('crumbs').innerHTML = parts.map(function(p,i){
    if(i===parts.length-1) return '<span class="crumb current">'+html(p.label)+'</span>';
    return '<span class="crumb link" onclick="('+p.fn.toString()+')()">'+html(p.label)+'</span>';
  }).join('<span class="sep"> › </span>');
}
function toggleTask(id){$(id).classList.toggle('open');}
function openLB(url){$('lbImg').src=url;$('lightbox').classList.add('show');}
function closeLB(){$('lightbox').classList.remove('show');}
function toast(msg){$('toast').textContent=msg;$('toast').classList.add('show');setTimeout(function(){$('toast').classList.remove('show');},3000);}
function html(s){return String(s??'').replace(/[&<>"']/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);});}
function esc(s){return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
